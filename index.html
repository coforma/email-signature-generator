<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Signature Generator</title>
    <!-- S-5: Load declared custom fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans&family=Work+Sans:wght@700&family=Signika:wght@600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #2572e4;
        --secondary-color: #595959;
        --background-color: #eeeeee;
        --form-background: #ffffff;
      }
      body {
        font-family:
          "Public Sans", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--background-color);
        color: var(--secondary-color);
        line-height: 1.6;
        margin: 0;
        padding: 20px;
      }
      /* m-7: wrap page title + card together in a single landmark */
      .page-wrapper {
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        font-family: "Work Sans", sans-serif;
        font-weight: 700;
        color: var(--primary-color);
        text-align: center;
        margin-bottom: 30px;
      }
      .container {
        display: flex;
        gap: 30px;
        background-color: var(--form-background);
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        overflow: hidden;
      }
      .form-container,
      .preview-container {
        flex: 1;
        padding: 30px;
      }
      h2 {
        font-family: "Signika", sans-serif;
        font-weight: 600;
        color: var(--secondary-color);
        border-bottom: 2px solid var(--primary-color);
        padding-bottom: 10px;
        margin-top: 0;
      }
      /* M-4: remove default fieldset chrome */
      fieldset {
        border: none;
        padding: 0;
        margin: 0;
      }
      /* M-5 / m-6: visually hidden utility for screen-reader-only content */
      .visually-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      form {
        display: grid;
        gap: 15px;
      }
      label {
        font-weight: bold;
        color: var(--secondary-color);
      }
      input[type="text"],
      input[type="email"],
      input[type="tel"],
      select {
        box-sizing: border-box;
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        transition: border-color 0.3s;
      }
      /* C-1: suppress default outline only; :focus-visible provides the real indicator */
      input[type="text"]:focus,
      input[type="email"]:focus,
      input[type="tel"]:focus,
      select:focus {
        border-color: var(--primary-color);
        outline: none;
      }
      input[type="text"]:focus-visible,
      input[type="email"]:focus-visible,
      input[type="tel"]:focus-visible,
      select:focus-visible,
      #copy-btn:focus-visible {
        outline: 2px solid var(--primary-color);
        outline-offset: 2px;
      }
      .preview-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 2px solid var(--primary-color);
        padding-bottom: 10px;
        margin-top: 0;
      }
      .preview-header h2 {
        border-bottom: none;
        padding-bottom: 0;
        margin: 0;
      }
      #copy-btn {
        background-color: var(--primary-color);
        color: #fff;
        border: none;
        border-radius: 5px;
        padding: 6px 14px;
        font-size: 14px;
        cursor: pointer;
        transition: background-color 0.2s, opacity 0.2s;
      }
      #copy-btn:hover {
        opacity: 0.85;
      }
      #copy-btn.copied {
        background-color: #2a9d5c;
      }
      #copy-btn.error {
        background-color: #c0392b;
      }
      #signature {
        background-color: #fff;
        border: 1px solid #ddd;
        border-radius: 5px;
        padding: 20px;
        margin-top: 20px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }
      @media (max-width: 768px) {
        .container {
          flex-direction: column;
        }
      }
      /* S-3: respect user motion preferences */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- m-7: h1 and .container share a .page-wrapper landmark -->
    <div class="page-wrapper">
      <h1>Email Signature Generator</h1>
      <div class="container">
        <div class="form-container">
          <h2>Your Information</h2>
          <!-- M-4: fieldset + visually-hidden legend groups fields for screen readers -->
          <!-- S-2: prevent Enter-key page reload via JS submit handler -->
          <form id="signatureForm">
            <fieldset>
              <legend class="visually-hidden">Signature information</legend>

              <label for="name">Name:</label>
              <!-- S-1: autocomplete attributes for WCAG 1.3.5 -->
              <input
                type="text"
                id="name"
                required
                placeholder="Your Name"
                autocomplete="name"
              />

              <label for="pronouns">Pronouns:</label>
              <input
                type="text"
                id="pronouns"
                placeholder="Your Pronouns"
                autocomplete="off"
              />

              <label for="title">Title:</label>
              <input
                type="text"
                id="title"
                placeholder="Your Title"
                autocomplete="organization-title"
              />

              <label for="phone">Phone:</label>
              <input
                type="tel"
                id="phone"
                placeholder="Your Phone Number"
                autocomplete="tel"
              />

              <label for="email">Email:</label>
              <input
                type="email"
                id="email"
                required
                placeholder="yourname@coforma.io"
                autocomplete="email"
              />

              <label for="medium">Medium Link:</label>
              <select id="medium"></select>
            </fieldset>
          </form>
        </div>
        <div class="preview-container">
          <div class="preview-header">
            <h2>Signature Preview</h2>
            <!-- M-5: aria-describedby links button to live status region -->
            <button id="copy-btn" type="button" aria-describedby="copy-status">
              Copy
            </button>
            <!-- M-5: screen-reader-only live region announces copy result -->
            <span id="copy-status" aria-live="polite" class="visually-hidden"></span>
          </div>
          <!-- m-6 / M-4: landmark region + live updates announced to screen readers -->
          <div
            id="signature"
            role="region"
            aria-label="Signature preview"
            aria-live="polite"
          ></div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const signature = document.getElementById("signature");
        const medium = document.getElementById("medium");
        const copyBtn = document.getElementById("copy-btn");
        const copyStatus = document.getElementById("copy-status");

        const links = [
          {
            title: "Sign up for our Collectively newsletter",
            href: "https://mailchi.mp/coforma/newsletter"
          },
          {
            title: "Read about the work we've done",
            href: "https://coforma.io/case-studies/"
          },
          {
            title: "Learn more about our services",
            href: "https://coforma.io/services/"
          }
        ];

        // Build select options via DocumentFragment — avoids repeated innerHTML re-parsing
        const fragment = document.createDocumentFragment();
        // Leading "no link" option — default state; omits the link line from the signature
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "— No link —";
        fragment.appendChild(placeholder);
        links.forEach((link, i) => {
          const opt = document.createElement("option");
          opt.value = i;
          opt.textContent = link.title;
          fragment.appendChild(opt);
        });
        medium.appendChild(fragment);

        // m-4: `strict: true` returns false instead of placeholder when field is empty
        const getValue = (id, { strict = false } = {}) => {
          const field = document.getElementById(id);
          if (field.value) return field.value;
          return strict ? false : field.placeholder;
        };

        // m-2: /\D/g is idiomatic for "remove non-digits"; m-1: slice() replaces deprecated substr()
        const formatPhone = (raw) => {
          return raw
            .replace(/\D/g, "")
            .slice(0, 10)
            .replace(/(\d{3})(\d{3})(\d{4})/, "$1.$2.$3");
        };

        const getPhone = () => formatPhone(getValue("phone"));

        // Strip domain — only the local part is used; @coforma.io is hardcoded in the template
        const getEmail = () => getValue("email").replace(/@.*/, "");

        const makeSignature = () => {
          // Compute all values once to avoid redundant DOM reads
          const pronouns = getValue("pronouns", { strict: true });
          const phone = getPhone();
          const email = getEmail();
          const selectedIndex = parseInt(getValue("medium"), 10);
          // Empty selection (placeholder chosen) means no link in the signature
          const link = Number.isNaN(selectedIndex) ? null : (links[selectedIndex] ?? null);

          return `
            <p style="color: #595959; font-family: Roboto, Trebuchet MS, sans-serif; font-size: small; letter-spacing: 0.01em; margin: 10px 0 0 0; line-height: 1.35;">
            <strong style="color: #2c2c2c;">${getValue("name")}</strong>
            ${pronouns ? `&nbsp;${pronouns}` : ""}<br />
            ${getValue("title")}<br />
            ${phone ? `M ${phone} &nbsp; ` : ""}<a style="color: #595959;" href="mailto:${email}@coforma.io">${email}@coforma.io</a>
            <br /><br /><a href="https://coforma.io/"><img width="116" style="width: 116px; min-width: 116px; max-width: 116px; border-radius: 1px;" src="https://coforma.io/media/images/coforma_navy.original.jpg" alt="Coforma" /></a>${link ? `<br /><a style="color: #2572e4; line-height: 2; margin-top: 2px; display: inline-block;" href="${link.href}">${link.title}</a>` : ""}</p>
          `;
        };

        // S-2: prevent Enter key from submitting the form and reloading the page
        document.getElementById("signatureForm").addEventListener("submit", (e) => {
          e.preventDefault();
        });

        // m-3: debounceTimer holds the setTimeout ID; shared across all inputs so any
        // field change resets the timer and only one signature rebuild fires per burst.
        let debounceTimer = null;
        document.querySelectorAll("input, select").forEach((el) => {
          el.addEventListener("input", () => {
            clearTimeout(debounceTimer);
            if (el.id === "phone") {
              el.value = formatPhone(el.value);
            }
            debounceTimer = setTimeout(() => {
              signature.innerHTML = makeSignature();
            }, 250);
          });
        });

        // C-2: handle clipboard errors with visible feedback
        copyBtn.addEventListener("click", () => {
          const html = signature.innerHTML;
          const blob = new Blob([html], { type: "text/html" });
          const item = new ClipboardItem({ "text/html": blob });

          navigator.clipboard.write([item]).then(() => {
            copyBtn.textContent = "Copied!";
            copyBtn.classList.add("copied");
            // M-5: announce success to screen readers via live region
            copyStatus.textContent = "Signature copied to clipboard.";
            setTimeout(() => {
              copyBtn.textContent = "Copy";
              copyBtn.classList.remove("copied");
              copyStatus.textContent = "";
            }, 2000);
          }).catch(() => {
            copyBtn.textContent = "Failed — copy manually";
            copyBtn.classList.add("error");
            copyStatus.textContent = "Copy failed. Please select and copy the signature manually.";
            setTimeout(() => {
              copyBtn.textContent = "Copy";
              copyBtn.classList.remove("error");
              copyStatus.textContent = "";
            }, 3000);
          });
        });

        signature.innerHTML = makeSignature();
      })();
    </script>
  </body>
</html>
